# ===========================================
# Next.js Fullstack Docker Compose 설정
# 개발 및 프로덕션 환경용
# ===========================================

version: '3.8'

services:
  # -----------------------------------------
  # PostgreSQL 데이터베이스
  # -----------------------------------------
  db:
    image: postgres:16-alpine
    container_name: nextjs-fullstack-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nextjs_fullstack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------
  # Next.js 애플리케이션
  # -----------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nextjs-fullstack-app
    restart: unless-stopped
    ports:
      - "10011:10011"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/nextjs_fullstack?schema=public
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:10011/api/hello"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -----------------------------------------
  # 개발 환경용 (선택사항)
  # docker-compose --profile dev up
  # -----------------------------------------
  app-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nextjs-fullstack-dev
    ports:
      - "10011:10011"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/nextjs_fullstack?schema=public
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - db

# -----------------------------------------
# 볼륨 정의
# -----------------------------------------
volumes:
  postgres_data:
    driver: local

# -----------------------------------------
# 네트워크 정의 (선택사항)
# -----------------------------------------
networks:
  default:
    name: nextjs-fullstack-network
